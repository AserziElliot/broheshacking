<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MountainOS</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* =========================================
           1. CSS: VARIABLES, NÚCLEO Y CURSOR ARCH/MINT
           ========================================= */
        :root {
            --bg-color: #0f0f14;
            --window-bg: rgba(20, 20, 25, 0.85);
            --window-border: rgba(255, 255, 255, 0.1);
            --text-color: #e0e0e0;
            --accent-color: #3498db; /* Mountain Blue */
            --taskbar-bg: rgba(10, 10, 15, 0.9);
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Cursor oscuro estilo Linux/Breeze creado con SVG puro para que nunca falle */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M4 2l11 11h-5l5 7-2 1-5-7-4 5z"/></svg>'), auto !important; 
        }

        body {
            overflow: hidden; background-color: #000; color: var(--text-color);
            height: 100vh; width: 100vw; user-select: none;
        }

        button, a, .start-item, .window-header, .app-card {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="black" stroke="white" stroke-width="1.5"><path d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.14 2-3.74a4.5 4.5 0 0 0-9 0c0 1.6.79 2.93 2 3.74zm-2 1.58A6.47 6.47 0 0 0 4 17.5 6.5 6.5 0 0 0 10.5 24 6.5 6.5 0 0 0 17 17.5a6.47 6.47 0 0 0-3-4.68v2.36a4.5 4.5 0 1 1-6 0v-2.36z"/></svg>'), pointer !important;
        }

        input, textarea { cursor: text !important; user-select: auto; }

        /* =========================================
           2. CSS: LOGIN Y PANTALLAS
           ========================================= */
        .fullscreen-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #0a0f16, #141e2a, #1c2a3b);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.5s;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 12px; border: 1px solid var(--window-border);
            text-align: center; width: 400px;
        }

        .login-box h1 { margin-bottom: 20px; font-weight: 600; font-size: 24px; color: var(--accent-color); }
        
        input.sys-input {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5);
            border: 1px solid var(--window-border); color: white; border-radius: 6px; outline: none;
        }
        input.sys-input:focus { border-color: var(--accent-color); }

        .btn {
            background: var(--accent-color); color: #fff; border: none; padding: 12px 20px;
            border-radius: 6px; font-weight: 600; width: 100%; margin-top: 15px; transition: 0.2s;
        }
        .btn:hover { filter: brightness(1.2); }
        .hidden { opacity: 0; pointer-events: none; visibility: hidden; }

        /* =========================================
           3. CSS: ESCRITORIO, BARRA Y MENÚ
           ========================================= */
        #desktop {
            position: absolute; top: 0; left: 0; right: 0; bottom: 48px;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') center/cover;
            z-index: 10;
        }

        #taskbar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
            background: var(--taskbar-bg); backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 15px; z-index: 9000;
            border-top: 1px solid var(--window-border); justify-content: space-between;
        }

        .start-btn {
            background: transparent; border: none; color: var(--accent-color);
            font-size: 16px; font-weight: 800; padding: 8px 15px; border-radius: 6px;
        }
        .start-btn:hover { background: rgba(255,255,255,0.1); }

        #start-menu {
            position: absolute; bottom: 60px; left: 15px; width: 280px;
            background: var(--window-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--window-border); border-radius: 12px; padding: 15px;
            opacity: 0; visibility: hidden; transform: translateY(20px); transition: 0.3s; z-index: 9001;
        }
        #start-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }

        .start-item {
            padding: 10px; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; display: flex; gap: 10px;
        }
        .start-item:hover { background: rgba(255,255,255,0.1); padding-left: 15px; }
        .admin-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; display: none; }

        /* =========================================
           4. CSS: VENTANAS Y APPS
           ========================================= */
        .window {
            position: absolute; top: 15%; left: 15%; width: 600px; height: 400px;
            background: var(--window-bg); border: 1px solid var(--window-border);
            border-radius: 8px; display: none; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(15px); overflow: hidden; z-index: 100;
        }
        .window.open { display: flex; }
        .window-header {
            background: rgba(0,0,0,0.6); padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--window-border);
        }
        .window-title { font-weight: 600; font-size: 14px; }
        .window-controls span {
            display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-left: 6px; transition: 0.2s;
        }
        .close-btn { background: var(--danger); }
        .max-btn { background: var(--success); }
        .window-content { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); overflow: hidden; }

        /* Chat */
        .chat-history { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.1); align-self: flex-start; }
        .msg.me { background: var(--accent-color); align-self: flex-end; }
        .chat-input-area { display: flex; padding: 10px; background: rgba(0,0,0,0.4); }
        .chat-input-area input { flex: 1; margin: 0; border-radius: 4px 0 0 4px; }
        .chat-input-area button { width: auto; margin: 0; border-radius: 0 4px 4px 0; padding: 0 15px; }

        /* Store / Admin */
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .app-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--window-border); }
        .app-card:hover { border-color: var(--accent-color); }
        .admin-panel { padding: 15px; background: rgba(231, 76, 60, 0.1); border-bottom: 1px solid var(--danger); display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="fullscreen-overlay">
        <div class="login-box">
            <h1>🏔️ MountainOS</h1>
            <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">Inicia sesión para continuar</p>
            <input type="text" id="login-user" class="sys-input" placeholder="Nombre de Usuario (Ej. Nicolas, Aserzi)" autocomplete="off">
            <button class="btn" onclick="SystemCore.login()">Entrar al Sistema</button>
        </div>
    </div>

    <div id="desktop"></div>

    <div id="taskbar">
        <button class="start-btn" onclick="WindowManager.toggleStartMenu()">🏔️ Menú</button>
        <div id="clock" style="font-size: 14px; font-weight: 500;">00:00</div>
    </div>

    <div id="start-menu">
        <div style="padding-bottom: 15px; margin-bottom: 10px; border-bottom: 1px solid var(--window-border);">
            <strong id="current-user-display">Usuario</strong>
            <span id="admin-badge" class="admin-badge">ADMIN</span>
        </div>
        <div class="start-item" onclick="WindowManager.openApp('app-editor')">📝 Notas Locales</div>
        <div class="start-item" onclick="WindowManager.openApp('app-chat')">💬 Chat Global (Real)</div>
        <div class="start-item" onclick="WindowManager.openApp('app-browser')">🌐 Navegador Proxy</div>
        <div class="start-item" onclick="WindowManager.openApp('app-store')">🛍️ App Store</div>
        <div id="dynamic-apps"></div> <hr style="border-color: var(--window-border); margin: 10px 0;">
        <div class="start-item" onclick="SystemCore.logout()" style="color: var(--danger);">🚪 Cerrar Sesión</div>
    </div>

    <div id="app-editor" class="window">
        <div class="window-header">
            <div class="window-title">📝 Editor de Notas</div>
            <div class="window-controls">
                <span class="max-btn" onclick="WindowManager.maximize('app-editor')"></span>
                <span class="close-btn" onclick="WindowManager.closeApp('app-editor')"></span>
            </div>
        </div>
        <div class="window-content">
            <textarea id="text-editor-area" style="width:100%; height:100%; background:transparent; color:white; border:none; outline:none; padding:15px; resize:none;" placeholder="Escribe aquí... se guardará automáticamente en tu cuenta."></textarea>
        </div>
    </div>

    <div id="app-chat" class="window">
        <div class="window-header">
            <div class="window-title">💬 Chat en Vivo</div>
            <div class="window-controls">
                <span class="max-btn" onclick="WindowManager.maximize('app-chat')"></span>
                <span class="close-btn" onclick="WindowManager.closeApp('app-chat')"></span>
            </div>
        </div>
        <div class="window-content">
            <div class="chat-history" id="chat-history"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" class="sys-input" placeholder="Mensaje..." onkeypress="if(event.key === 'Enter') ChatApp.send()">
                <button class="btn" onclick="ChatApp.send()">Enviar</button>
            </div>
        </div>
    </div>

    <div id="app-browser" class="window">
        <div class="window-header">
            <div class="window-title">🌐 Navegador Libre</div>
            <div class="window-controls">
                <span class="max-btn" onclick="WindowManager.maximize('app-browser')"></span>
                <span class="close-btn" onclick="WindowManager.closeApp('app-browser')"></span>
            </div>
        </div>
        <div style="display:flex; padding: 10px; background: rgba(0,0,0,0.6);">
            <input type="text" id="url-bar" class="sys-input" value="https://es.wikipedia.org" style="margin:0; border-radius:4px 0 0 4px;" onkeypress="if(event.key === 'Enter') BrowserApp.go()">
            <button class="btn" style="margin:0; width:auto; border-radius:0 4px 4px 0;" onclick="BrowserApp.go()">Ir</button>
        </div>
        <div class="window-content" style="background: #fff;">
            <iframe id="browser-frame" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div id="app-store" class="window">
        <div class="window-header">
            <div class="window-title">🛍️ Mountain Store</div>
            <div class="window-controls">
                <span class="max-btn" onclick="WindowManager.maximize('app-store')"></span>
                <span class="close-btn" onclick="WindowManager.closeApp('app-store')"></span>
            </div>
        </div>
        <div class="window-content" style="overflow-y: auto;">
            <div id="admin-tools" class="admin-panel">
                <h3 style="color: var(--danger); margin-bottom: 10px;">🛠️ Developer Tools</h3>
                <input type="text" id="new-app-name" class="sys-input" placeholder="Nombre de la nueva App">
                <button class="btn" style="background: var(--danger);" onclick="StoreApp.createApp()">Publicar App Global</button>
            </div>
            
            <div class="store-grid" id="store-grid">
                </div>
        </div>
    </div>


    <script>
        // 1. INICIALIZAR SOCKET (Si falla la conexión local, ignora el error visualmente)
        let socket;
        try { socket = io(); } catch(e) { console.warn("Socket.io no encontrado. El chat real requiere el backend."); }

        // 2. NÚCLEO DEL SISTEMA (Privilegios y Autenticación)
        const SystemCore = {
            currentUser: null,
            admins: ["Nicolas", "Aserzi", "nicolas", "aserzi"],

            login: function() {
                const user = document.getElementById('login-user').value.trim();
                if(!user) return alert("Ingresa un nombre.");
                
                this.currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('current-user-display').innerText = user;

                // Verificar privilegios
                if(this.admins.includes(user.toLowerCase())) {
                    document.getElementById('admin-badge').style.display = 'inline-block';
                    document.getElementById('admin-tools').style.display = 'block';
                    console.log("🔓 Acceso de Administrador Concedido.");
                }

                // Cargar archivos locales del usuario
                StorageApp.loadFiles();
                // Sincronizar tienda
                StoreApp.fetchApps();
            },

            logout: function() {
                this.currentUser = null;
                document.getElementById('login-screen').classList.remove('hidden');
                WindowManager.closeAll();
                document.getElementById('start-menu').classList.remove('active');
                document.getElementById('login-user').value = '';
                document.getElementById('admin-badge').style.display = 'none';
                document.getElementById('admin-tools').style.display = 'none';
            }
        };

        // 3. GESTOR DE VENTANAS Y ESCRITORIO
        const WindowManager = {
            zIndex: 100,
            
            init: function() {
                setInterval(() => {
                    const d = new Date();
                    document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }, 1000);

                // Lógica de arrastre de ventanas
                document.querySelectorAll('.window').forEach(win => {
                    const header = win.querySelector('.window-header');
                    header.onmousedown = (e) => {
                        if(e.target.tagName === 'SPAN') return;
                        this.bringToFront(win);
                        let shiftX = e.clientX - win.getBoundingClientRect().left;
                        let shiftY = e.clientY - win.getBoundingClientRect().top;

                        function moveAt(pageX, pageY) {
                            win.style.left = pageX - shiftX + 'px';
                            win.style.top = Math.max(0, pageY - shiftY) + 'px';
                        }
                        
                        function onMouseMove(event) { moveAt(event.pageX, event.pageY); }
                        document.addEventListener('mousemove', onMouseMove);
                        document.onmouseup = () => {
                            document.removeEventListener('mousemove', onMouseMove);
                            document.onmouseup = null;
                        };
                    };
                    win.onmousedown = () => this.bringToFront(win);
                });
            },

            toggleStartMenu: () => document.getElementById('start-menu').classList.toggle('active'),
            openApp: function(id) {
                const app = document.getElementById(id);
                app.classList.add('open');
                this.bringToFront(app);
                document.getElementById('start-menu').classList.remove('active');
            },
            closeApp: (id) => document.getElementById(id).classList.remove('open'),
            closeAll: () => document.querySelectorAll('.window').forEach(w => w.classList.remove('open')),
            maximize: function(id) {
                const win = document.getElementById(id);
                if(win.dataset.max == "true") {
                    win.style.width = '600px'; win.style.height = '400px'; 
                    win.style.top = '15%'; win.style.left = '15%'; win.dataset.max = "false";
                } else {
                    win.style.width = '100vw'; win.style.height = 'calc(100vh - 48px)'; 
                    win.style.top = '0'; win.style.left = '0'; win.dataset.max = "true";
                }
            },
            bringToFront: function(win) {
                this.zIndex++;
                win.style.zIndex = this.zIndex;
            }
        };

        // 4. APLICACIONES INDIVIDUALES

        // A. Almacenamiento Persistente (Notas)
        const StorageApp = {
            init: function() {
                document.getElementById('text-editor-area').addEventListener('input', (e) => {
                    if(SystemCore.currentUser) {
                        localStorage.setItem(`mountain_doc_${SystemCore.currentUser}`, e.target.value);
                    }
                });
            },
            loadFiles: function() {
                const saved = localStorage.getItem(`mountain_doc_${SystemCore.currentUser}`);
                document.getElementById('text-editor-area').value = saved || "";
            }
        };

        // B. Chat Real (Sockets)
        const ChatApp = {
            init: function() {
                if(socket) {
                    socket.on('chat_message', (data) => {
                        const history = document.getElementById('chat-history');
                        const isMe = data.user === SystemCore.currentUser;
                        history.innerHTML += `
                            <div class="msg ${isMe ? 'me' : ''}">
                                <div style="font-size:10px; opacity:0.7; margin-bottom:4px;">${data.user} [${data.time}]</div>
                                ${data.msg}
                            </div>`;
                        history.scrollTop = history.scrollHeight;
                    });
                }
            },
            send: function() {
                const input = document.getElementById('chat-input');
                if(input.value.trim() && socket) {
                    socket.emit('chat_message', { 
                        user: SystemCore.currentUser, 
                        msg: input.value,
                        time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                    });
                    input.value = "";
                } else if(!socket) {
                    alert("No hay conexión con el servidor Node.js");
                }
            }
        };

        // C. Navegador Proxy
        const BrowserApp = {
            go: function() {
                let url = document.getElementById('url-bar').value;
                if(!url.startsWith('http')) url = 'https://' + url;
                document.getElementById('url-bar').value = url;
                // Llama a la ruta /proxy que configuramos en server.js
                document.getElementById('browser-frame').src = `/proxy?url=${encodeURIComponent(url)}`;
            }
        };

        // D. Tienda de Apps y Creación de Apps (Nicolas/Aserzi)
        const StoreApp = {
            fetchApps: async function() {
                try {
                    const res = await fetch('/api/apps');
                    const apps = await res.json();
                    const grid = document.getElementById('store-grid');
                    grid.innerHTML = '';
                    apps.forEach(app => {
                        grid.innerHTML += `
                            <div class="app-card">
                                <h3>${app.icon} ${app.name}</h3>
                                <button class="btn" style="padding: 5px; margin-top: 10px;" onclick="alert('App ${app.name} lista!')">Instalar</button>
                            </div>`;
                    });
                } catch(e) {
                    console.log("Servidor de Apps offline. Usando tienda local fallback.");
                }
            },
            createApp: async function() {
                const name = document.getElementById('new-app-name').value;
                if(!name) return;
                
                try {
                    await fetch('/api/create-app', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user: SystemCore.currentUser,
                            appConfig: { id: `app-${Date.now()}`, name: name, icon: '⚡' }
                        })
                    });
                    alert(`App ${name} publicada en MountainOS.`);
                    this.fetchApps(); // Refrescar tienda
                } catch (e) {
                    alert("Error publicando app. Asegúrate de estar corriendo en Render con el backend activo.");
                }
            }
        };

        // 5. ARRANQUE DEL SISTEMA
        window.onload = () => {
            WindowManager.init();
            StorageApp.init();
            ChatApp.init();
            // Cerrar menú si se hace clic fuera
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('start-menu');
                const btn = document.querySelector('.start-btn');
                if (!menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove('active');
            });
        };
    </script>
</body>
</html>
    }
}
    </script>
</body>
</html>
